name: Deploy to HF Space
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Push to Space
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: git push --force https://hf:$HF_TOKEN@huggingface.co/spaces/ranjanapanwar/text-summarizer main